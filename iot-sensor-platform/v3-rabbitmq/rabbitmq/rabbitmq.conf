# 啟用 MQTT listener（預設 port 1883）
mqtt.listeners.tcp.default = 1883

# MQTT 預設 vhost（/ 是 RabbitMQ 的根 vhost）
mqtt.vhost = /

# 允許匿名連線（方便開發，生產環境應設為 false）
mqtt.allow_anonymous = true

# MQTT 訊息預設交付到 amq.topic exchange
# MQTT topic 的 / 會被自動轉換成 AMQP routing key 的 .
# 例如：sensors/temperature → sensors.temperature
